<!DOCTYPE html>
<html>
<head>
  <title>Earn App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      background: #00ffcc;
      font-size: 16px;
    }

    .bottom {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #222;
      padding: 10px 0;
    }
  </style>
</head>

<body>

<h2 id="balance">Balance: 0</h2>

<!-- HOME -->
<div id="home" class="page active">

  <h3>Join Channel & Earn</h3>
  <button onclick="joinChannel()">Join & Earn +20</button>

  <h3>Watch Ads</h3>
  <button onclick="watchAd()">Watch Ad & Earn</button>

  <p id="timer"></p>

</div>

<!-- REFER -->
<div id="refer" class="page">
  <h3>Refer & Earn</h3>
  <p>Your referral system coming soon...</p>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <h3>Profile</h3>
  <p>Your balance:</p>
  <h2 id="profileBalance">0</h2>
</div>

<!-- BOTTOM MENU -->
<div class="bottom">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('refer')">Refer</button>
  <button onclick="showPage('profile')">Profile</button>
</div>

<script>
  let balance = 0;

  function updateBalance() {
    document.getElementById("balance").innerText = "Balance: " + balance;
    document.getElementById("profileBalance").innerText = balance;
  }

  function showPage(page) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
  }

  // 🔥 Channel Join
  function joinChannel() {
    window.open("https://t.me/yourchannel", "_blank"); // এখানে তোমার channel link বসাও
    balance += 20;
    alert("Joined! +20 coins");
    updateBalance();
  }

  // 🔥 Watch Ad with Timer
  function watchAd() {
    let time = 15;
    document.getElementById("timer").innerText = "Wait: " + time + " sec";

    let interval = setInterval(() => {
      time--;
      document.getElementById("timer").innerText = "Wait: " + time + " sec";

      if (time <= 0) {
        clearInterval(interval);
        balance += 10;
        alert("Ad watched! +10 coins");
        updateBalance();
        document.getElementById("timer").innerText = "";
      }
    }, 1000);

    window.open("https://www.profitablecpmratenetwork.com/fykx453ta?key=13459b9e422bae6658bb3a88b3efe18f", "_blank");
  }
</script>

</body>
</html>
